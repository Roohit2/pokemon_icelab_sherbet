<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sherbet</title>

  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="card.css">
  <link rel="stylesheet" href="detail.css">
  <link rel="stylesheet" href="moves.css">
</head>

<body>

  <header class="site-header">
    <div class="site-header-inner">

      <h1 class="site-title">
        <span class="title-snow">❄</span>
        <span>SHERBET</span>
        <span class="title-snow">❄</span>
      </h1>

      <p class="site-subtitle">
        ポケモンチャンピオンズ 氷タイプ研究所
      </p>

      <p class="site-description">
        氷ポケモン愛好家のための対面/後出し性能、有利不利データベース
      </p>

      <div class="header-line"></div>

      <div class="controls">
        <button type="button" onclick="sortByHp()">
          💗 HP順
        </button>

        <button type="button" onclick="sortByAtk()">
          ⚔️ 攻撃順
        </button>

        <button type="button" onclick="sortByDefense()">
          🛡️ 防御順
        </button>

        <button type="button" onclick="sortBySpAtk()">
          🧙 特攻順
        </button>

        <button type="button" onclick="sortBySpDefense()">
          🔮 特防順
        </button>

        <button type="button" onclick="sortBySpeed()">
          💨 素早さ順
        </button>

        <button type="button" onclick="showMegaOnly()">
          ✨ メガシンカ
        </button>

        <button type="button" onclick="showAllPokemon()">
          ❄️ 全表示
        </button>
      </div>

    </div>
  </header>

  <main>
    <div id="pokemon-list"></div>
    <div id="result"></div>
  </main>

  <script src="script.js"></script>

</body>

</html>
