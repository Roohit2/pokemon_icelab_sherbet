<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sherbet</title>

  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/card.css">
  <link rel="stylesheet" href="css/detail.css">
  <link rel="stylesheet" href="css/moves.css">
  <link rel="stylesheet" href="css/game.css">

  <script src="script.js" defer></script>
  <script src="game.js" defer></script>
</head>

<body>

  <header class="site-header">
    <div class="site-header-inner">

      <h1 class="site-title">
        <span class="title-snow">❄</span>
        <span>SHERBET</span>
        <span class="title-snow">❄</span>
      </h1>

      <p class="site-subtitle">
        ポケモンチャンピオンズ 氷タイプ研究所
      </p>

      <p class="site-description">
        氷ポケモン愛好家のための対面/後出し性能、有利不利データベース
      </p>

      <div class="header-line"></div>

      <div class="controls">
        <button type="button" onclick="sortByHp()">
          💗 HP順
        </button>

        <button type="button" onclick="sortByAtk()">
          ⚔️ 攻撃順
        </button>

        <button type="button" onclick="sortByDefense()">
          🛡️ 防御順
        </button>

        <button type="button" onclick="sortBySpAtk()">
          🧙 特攻順
        </button>

        <button type="button" onclick="sortBySpDefense()">
          🔮 特防順
        </button>

        <button type="button" onclick="sortBySpeed()">
          💨 素早さ順
        </button>

        <button type="button" onclick="showMegaOnly()">
          ✨ メガシンカ
        </button>

        <button type="button" onclick="showAllPokemon()">
          ❄️ 全表示
        </button>

        <button type="button" id="open-game-button">
          🎮 ミニゲーム
        </button>
      </div>

    </div>
  </header>

  <main>
    <div id="pokemon-list"></div>
    <div id="result"></div>
  </main>

  <div id="game-modal" class="game-modal" aria-hidden="true">
    <div id="game-window" class="game-window">

      <div class="game-window-header">
        <div>
          <h2>
            SHERBET 雪合戦
          </h2>

          <p>
            攻撃を当ててスコアを稼げ！
          </p>
        </div>

        <button type="button" id="game-close-button" class="game-close-button" aria-label="ミニゲームを閉じる">
          ×
        </button>
      </div>

      <div class="game-status">
        <span>
          SCORE
          <strong id="game-score">0</strong>
        </span>

        <span>
          COMBO
          <strong id="game-combo">0</strong>
        </span>

        <span>
          TIME
          <strong id="game-time">30</strong>
        </span>
      </div>

      <div class="game-canvas-wrapper">
        <canvas id="game-canvas" width="480" height="600"></canvas>
      </div>

      <div class="mobile-game-controls">
        <button type="button" id="game-left-button" class="mobile-move-button" aria-label="左へ移動">
          ◀
        </button>

        <p>
          画面タップで発射
        </p>

        <button type="button" id="game-right-button" class="mobile-move-button" aria-label="右へ移動">
          ▶
        </button>
      </div>

      <div class="game-message-area">
        <p id="game-message">
          「ゲーム開始」を押してください。
        </p>
      </div>

      <div class="game-moves">
        <button type="button" id="game-move-display" class="game-move-button active" disabled>
          ❄ こおりのつぶて
        </button>
      </div>

      <div class="game-controls">
        <p class="pc-game-guide">
          移動：← →
          <br>
          発射：Space
        </p>

        <button type="button" id="game-start-button" class="game-start-button">
          ゲーム開始
        </button>
      </div>

    </div>
  </div>

</body>

</html>
