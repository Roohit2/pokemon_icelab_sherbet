<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sherbet - 氷タイプ研究所</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="hero">
    <h1 class="hero-title">
      ❄ Sherbet ❄
    </h1>

    <p class="hero-subtitle">
      ポケモンチャンピオンズ 氷タイプ研究所
    </p>

    <p class="hero-description">
      氷ポケモン愛好家のための対面/後出し性能、有利不利データベース
    </p>

    <hr class="ice-divider">

  </div>

  <!-- <input id="search" placeholder="ポケモン名で検索"> -->

  <div class="filter-buttons">

    <button onclick="sortByHp()">❤️ HP順</button>
    <button onclick="sortByAtk()">⚔️ 攻撃順</button>
    <button onclick="sortByDefense()">🛡️ 防御順</button>
    <button onclick="sortBySpAtk()">🧙 特攻順</button>
    <button onclick="sortBySpDefense()">🔮 特防順</button>
    <button onclick="sortBySpeed()">💨 素早さ順</button>
    <button onclick="showMegaOnly()">✨ メガシンカ</button>
    <button onclick="displayPokemon(allPokemon)">❄️ 全表示</button>

  </div>

  <div id="pokemon-list"></div>

  <div id="result"></div>

  <script src="script.js"></script>

</body>

</html>
